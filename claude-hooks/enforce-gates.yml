# enforce-gates.yml — Claude Code enforce-gate configuration
#
# Config resolution — TODOS os arquivos encontrados são merged (não "primeiro vence"):
#   1. ~/.claude/enforce-gates.yml     (global/user, mais fraco)
#   2. .claude/enforce-gates.yml       (project-local, overlay)
#   3. $CLAUDE_ENFORCE_GATE_CONFIG     (override explícito, mais forte)
#
# Merge:
#   defaults  → shallow merge; fonte mais forte vence por chave
#   gates     → concatenados; gates com mesmo id: fonte mais forte substitui
#
# Hook types suportados (campo hook_types por gate):
#   PreToolUse       → antes de uma chamada de ferramenta (pode bloquear com exit 2)
#   PostToolUse      → após execução de ferramenta (informacional)
#   UserPromptSubmit → quando o usuário submete um prompt (pode bloquear com exit 2)
#   Stop             → quando Claude para (informacional)
#   Notification     → eventos de notificação (informacional)
#
# Gate behaviors:
#   one-shot (default)  block -> pass -> block -> pass -> ... (alterna por valor por sessão)
#   time                block, passa até gate_time segundos desde o último block, então repete
#
# Matcher types (para PreToolUse/PostToolUse, campo matcher / matcher_type):
#   glob  (default)  fnmatch contra basename quando sem barra, caminho completo caso contrário
#   regex            Python re.search contra o caminho completo
#
# Trigger (para outros hook types, ou override em qualquer tipo):
#   trigger:
#     field: <campo do payload a inspecionar>   (ex: prompt, stop_reason, notification_type)
#     pattern: <padrão a aplicar>
#     matcher_type: glob | regex
#
# block_exit_code:
#   2 (default)  hard-block — Claude Code não executa a ação
#   1            soft error — registrado mas pode não bloquear dependendo do hook type

version: 1

defaults:
  behavior: one-shot
  gate_time: 30
  block_exit_code: 2
  tools:
    - Edit
    - Write
    - MultiEdit

gates:
  - id: styles
    hook_types:
      - PreToolUse
    enabled: true
    name: "Arquivo de Estilos Protegido"
    matcher: "*.styles.ts"
    matcher_type: glob
    behavior: one-shot
    block_exit_code: 2
    message: |
      ENFORCE GATE -- Arquivo de Estilos Protegido (*.styles.ts)

      Edicao BLOQUEADA nesta tentativa. Antes de tentar novamente, voce DEVE
      responder os 5 pontos abaixo no seu proximo turno:

        1. FATOS    -> Quais fatos concretos justificam editar este arquivo agora?
        2. MOTIVO   -> Qual e o motivo especifico e preciso da modificacao?
        3. REGRAS   -> Esta edicao quebra alguma Claude rule?
                      Liste explicitamente cada rule afetada.
        4. CERTEZA  -> Voce tem certeza absoluta que este arquivo precisa ser alterado?
        5. TOKEN    -> [ATENCAO] Estilos inline NAO sao permitidos.
                       Qual token do design system sera utilizado?
                       (ex: colors.primary.500, spacing.md, typography.heading.lg)

      Na proxima tentativa este gate sera liberado para esta sessao.
      Ignorar estas perguntas e uma violacao de Claude rules.

  - id: ui-components
    hook_types:
      - PreToolUse
    enabled: true
    name: "Componente UI Protegido"
    matcher: "(components|ui)/[^/]+\\.tsx$"
    matcher_type: regex
    behavior: one-shot
    block_exit_code: 2
    message: |
      ENFORCE GATE -- Componente UI Protegido (components|ui/*.tsx)

      Edicao BLOQUEADA nesta tentativa. Antes de tentar novamente, voce DEVE:

        a) MOTIVO     -> Qual e o motivo da modificacao neste componente?
                         (responda diretamente no proximo turno)

        b) IMPACTO    -> Quais outros arquivos/componentes serao impactados?
                         (liste cada caminho explicitamente)

        c) REGRAS     -> Esta alteracao quebra alguma Claude rule?
                         [ATENCAO] Se SIM -> use AskUserQuestion AGORA para obter
                         consentimento explicito antes de prosseguir.
                         NAO edite sem resposta afirmativa do usuario.

        d) DESIGN     -> Esta modificacao esta prevista no design system?
                         [SIM]  -> informe o token do design system a usar.
                                   (ex: Button.variant.primary, Card.shadow.md)
                         [NAO]  -> trate como quebra de regra (ver item c):
                                   use AskUserQuestion antes de continuar.

      Responda a) e b) no proximo turno.
      Para c) e d), acione AskUserQuestion conforme indicado acima.
      Na proxima tentativa este gate sera liberado para esta sessao.

